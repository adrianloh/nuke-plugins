name: Build / Release

on:
  workflow_dispatch:
    inputs:
      plugin:
        description: "Plugin to build"
        required: true
        type: choice
        options:
          - BaseSixFour
          # Add new plugins here (must match directory name exactly):
          # - webPReader
          # - Loki

  push:
    # Tag format: <pluginname-lowercase>-v<semver>
    # Examples: basesixfour-v1.0.0, loki-v2.3.1, webpreader-v0.1.0
    tags:
      - "*-v*"

jobs:
  # --- Manual build (dispatch) ----------------------------------------
  dispatch-build:
    if: github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/build-plugin.yml
    with:
      plugin: ${{ inputs.plugin }}
      release: false

  # --- Tag-driven release ---------------------------------------------
  # Parse the tag to figure out which plugin to build + release.
  # Tag "basesixfour-v1.0.0" -> plugin "BaseSixFour" (case-restored via table).
  parse-tag:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    outputs:
      plugin: ${{ steps.parse.outputs.plugin }}
      valid: ${{ steps.parse.outputs.valid }}
    steps:
      - name: Parse tag
        id: parse
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          LOWER="${TAG%%-v*}"
          echo "Tag: $TAG  (plugin slug: $LOWER)"

          # Map lowercase slug -> actual directory name.
          # Extend this table when adding plugins.
          case "$LOWER" in
            basesixfour) PLUGIN=BaseSixFour ;;
            # webpreader) PLUGIN=webPReader ;;
            # loki)       PLUGIN=Loki ;;
            *)
              echo "Unknown plugin slug '$LOWER' in tag '$TAG'."
              echo "valid=false" >> "$GITHUB_OUTPUT"
              exit 0
              ;;
          esac

          echo "plugin=$PLUGIN" >> "$GITHUB_OUTPUT"
          echo "valid=true" >> "$GITHUB_OUTPUT"
          echo "Resolved: $PLUGIN"

  tag-release:
    needs: parse-tag
    if: needs.parse-tag.outputs.valid == 'true'
    permissions:
      contents: write
    uses: ./.github/workflows/build-plugin.yml
    with:
      plugin: ${{ needs.parse-tag.outputs.plugin }}
      release: true
      release_tag: ${{ github.ref_name }}
